name: Market Report Bot

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. These run at 08:30, 12:30, 21:30 Hong Kong time.
    - cron: "30 0 * * 1-5"
    - cron: "30 4 * * 1-5"
    - cron: "30 13 * * 1-5"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send market report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_ENDPOINT: ${{ vars.LLM_ENDPOINT }}
          GLM_MODEL: ${{ vars.GLM_MODEL }}
          LONGBRIDGE_APP_KEY: ${{ secrets.LONGBRIDGE_APP_KEY }}
          LONGBRIDGE_APP_SECRET: ${{ secrets.LONGBRIDGE_APP_SECRET }}
          LONGBRIDGE_ACCESS_TOKEN: ${{ secrets.LONGBRIDGE_ACCESS_TOKEN }}
          LONGBRIDGE_REGION: hk
          PORTFOLIO_SYMBOLS: ${{ vars.PORTFOLIO_SYMBOLS }}
          WATCHLIST_SYMBOLS: ${{ vars.WATCHLIST_SYMBOLS }}
          NEWS_QUERIES: ${{ vars.NEWS_QUERIES }}
          ACCOUNT_POSITIONS_JSON: ${{ secrets.ACCOUNT_POSITIONS_JSON }}
        run: python main.py

      - name: Persist report memory
        if: always()
        run: |
          if git status --porcelain report_memory.json | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add report_memory.json
            git commit -m "Update report memory [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}" || echo "memory push failed (non-fatal)"
          fi
